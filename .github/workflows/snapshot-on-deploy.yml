# After each push to main: export storage snapshot as a GitHub Actions artifact only (not committed to Git).
name: Snapshot on deploy

on:
  push:
    branches: [main]

jobs:
  snapshot:
    name: Storage snapshot (post-deploy)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create backups directory
        run: mkdir -p backups

      - name: Check backup secrets
        env:
          REMOTE_STORAGE_BASE: ${{ secrets.REMOTE_STORAGE_BASE }}
        run: |
          if [ -z "$REMOTE_STORAGE_BASE" ]; then
            echo "::error::REMOTE_STORAGE_BASE secret is not set. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Run storage snapshot
        env:
          REMOTE_STORAGE_BASE: ${{ secrets.REMOTE_STORAGE_BASE }}
          REMOTE_STORAGE_USER: ${{ secrets.REMOTE_STORAGE_USER }}
          REMOTE_STORAGE_API_KEY: ${{ secrets.REMOTE_STORAGE_API_KEY }}
        run: |
          export SNAPSHOT_FILE="backups/storage-snapshot-latest.json"
          node server/scripts/export-storage-snapshot.js "" "$SNAPSHOT_FILE"
          ls -la backups/

      - name: Upload snapshot artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-on-deploy-${{ github.run_id }}
          path: backups/storage-snapshot-latest.json
          retention-days: 14
          if-no-files-found: error
