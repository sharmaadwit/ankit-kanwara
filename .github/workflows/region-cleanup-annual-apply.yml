name: Annual report region apply (migration only)

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply fixes to migration_* activity keys (annual report only)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    branches: [main]
    paths:
      - 'server/scripts/lib/annualReportPresalesRegions.js'
      - 'server/scripts/region-cleanup-apply-annual-remote.js'
      - '.github/workflows/region-cleanup-annual-apply.yml'

jobs:
  annual-migration-regions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Dry-run (migration activities only)
        env:
          REMOTE_STORAGE_BASE: ${{ secrets.REMOTE_STORAGE_BASE }}
          REMOTE_STORAGE_USER: ${{ secrets.REMOTE_STORAGE_USER }}
          REMOTE_STORAGE_API_KEY: ${{ secrets.REMOTE_STORAGE_API_KEY }}
        run: node server/scripts/region-cleanup-apply-annual-remote.js | tee annual-apply.log
      - name: Apply to production migration_* keys
        if: github.event_name == 'push' || inputs.apply == 'true'
        env:
          REMOTE_STORAGE_BASE: ${{ secrets.REMOTE_STORAGE_BASE }}
          REMOTE_STORAGE_USER: ${{ secrets.REMOTE_STORAGE_USER }}
          REMOTE_STORAGE_API_KEY: ${{ secrets.REMOTE_STORAGE_API_KEY }}
          DRY_RUN: 'false'
          APPLY: 'true'
        run: node server/scripts/region-cleanup-apply-annual-remote.js | tee annual-apply-live.log
      - name: Summary
        run: |
          echo "## Annual report region cleanup (migration_* only)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 80 annual-apply.log >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.apply }}" = "true" ]; then
            echo "--- APPLY ---" >> "$GITHUB_STEP_SUMMARY"
            tail -n 40 annual-apply-live.log >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
