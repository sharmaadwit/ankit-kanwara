# Daily storage snapshot — runs once per day (9 AM IST). Does not commit to Git.
# Artifacts are retained 14 days (download from Actions). For long-term retention, copy the latest artifact off GitHub.
name: Daily storage backup

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check backup secrets
        env:
          REMOTE_STORAGE_BASE: ${{ secrets.REMOTE_STORAGE_BASE }}
        run: |
          if [ -z "$REMOTE_STORAGE_BASE" ]; then
            echo "::error::REMOTE_STORAGE_BASE secret is not set. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "REMOTE_STORAGE_BASE is set (value redacted)."

      - name: Run storage snapshot export
        env:
          REMOTE_STORAGE_BASE: ${{ secrets.REMOTE_STORAGE_BASE }}
          REMOTE_STORAGE_USER: ${{ secrets.REMOTE_STORAGE_USER }}
          REMOTE_STORAGE_API_KEY: ${{ secrets.REMOTE_STORAGE_API_KEY }}
        run: |
          mkdir -p backups
          TS=$(date +%Y-%m-%d)
          node server/scripts/export-storage-snapshot.js "" "backups/storage-snapshot-${TS}.json"
          cp "backups/storage-snapshot-${TS}.json" backups/storage-snapshot-latest.json
          ls -la backups/

      - name: Upload snapshot artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: storage-backup-${{ github.run_id }}
          path: |
            backups/storage-snapshot-*.json
          retention-days: 14
          if-no-files-found: error
