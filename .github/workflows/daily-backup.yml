# Daily storage snapshot backup – 1 per day at 9 AM IST
# Keeps only storage-snapshot-latest.json (deploy snapshot also overwrites this).
# Deploy snapshots: snapshot-on-deploy.yml runs on push to main (no extra retention).
name: Daily storage backup

on:
  schedule:
    # 9 AM IST = 03:30 UTC
    - cron: '30 3 * * *'
  workflow_dispatch:

env:
  SNAPSHOT_FILE: backups/storage-snapshot-latest.json

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check backup secrets
        env:
          REMOTE_STORAGE_BASE: ${{ secrets.REMOTE_STORAGE_BASE }}
        run: |
          if [ -z "$REMOTE_STORAGE_BASE" ]; then
            echo "::error::REMOTE_STORAGE_BASE secret is not set. Add it in Settings > Secrets and variables > Actions (e.g. https://YOUR-APP.up.railway.app/api/storage)."
            exit 1
          fi
          echo "REMOTE_STORAGE_BASE is set (value redacted)."

      - name: Run storage snapshot export
        env:
          REMOTE_STORAGE_BASE: ${{ secrets.REMOTE_STORAGE_BASE }}
          REMOTE_STORAGE_USER: ${{ secrets.REMOTE_STORAGE_USER }}
          REMOTE_STORAGE_API_KEY: ${{ secrets.REMOTE_STORAGE_API_KEY }}
          SNAPSHOT_FILE: backups/storage-snapshot-latest.json
        run: |
          mkdir -p backups
          node server/scripts/export-storage-snapshot.js "" "backups/storage-snapshot-latest.json"

      - name: Purge other backups (keep only latest; leave backups/archive/ intact)
        run: |
          shopt -s nullglob 2>/dev/null || true
          for f in backups/storage-snapshot-2*.json backups/pre-deploy-*.json backups/pre-deploy-manifest-*.json backups/local-insurance-*.json; do
            [ -f "$f" ] && [ "$f" != "backups/storage-snapshot-latest.json" ] && rm -f "$f" && echo "Removed: $f"
          done
          ls -la backups/ 2>/dev/null; ls -la backups/archive/ 2>/dev/null || true

      - name: Commit and push snapshot
        if: success()
        run: |
          if [ ! -f backups/storage-snapshot-latest.json ]; then
            echo "Snapshot file not found."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/storage-snapshot-latest.json
          git status
          git diff --staged --quiet && echo "No changes to commit" || (git commit -m "chore: daily storage snapshot (9 AM IST) [skip ci]" && git push)
