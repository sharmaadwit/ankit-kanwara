# HOURLY backup – temporary for 7 days
# Runs every hour, commits timestamped snapshot to Git.
# After 7 days: disable this workflow (Actions tab → Hourly backup 7 days → Disable) or delete this file.
name: Hourly backup (7 days)

on:
  schedule:
    # Every hour at minute 0 (UTC)
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  SNAPSHOT_DIR: backups

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check backup secrets
        env:
          REMOTE_STORAGE_BASE: ${{ secrets.REMOTE_STORAGE_BASE }}
        run: |
          if [ -z "$REMOTE_STORAGE_BASE" ]; then
            echo "::error::REMOTE_STORAGE_BASE secret is not set. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Run hourly storage snapshot
        env:
          REMOTE_STORAGE_BASE: ${{ secrets.REMOTE_STORAGE_BASE }}
          REMOTE_STORAGE_USER: ${{ secrets.REMOTE_STORAGE_USER }}
          REMOTE_STORAGE_API_KEY: ${{ secrets.REMOTE_STORAGE_API_KEY }}
        run: |
          mkdir -p backups
          # One file per hour: storage-snapshot-YYYY-MM-DD-HH.json
          TS=$(date +%Y-%m-%d-%H)
          export SNAPSHOT_FILE="backups/storage-snapshot-${TS}.json"
          node server/scripts/export-storage-snapshot.js "" "$SNAPSHOT_FILE"

      - name: Update latest pointer
        run: |
          TS=$(date +%Y-%m-%d-%H)
          if [ -f "backups/storage-snapshot-${TS}.json" ]; then
            cp "backups/storage-snapshot-${TS}.json" backups/storage-snapshot-latest.json
          fi

      - name: Retain only last 168 hourly snapshots (7 days)
        run: |
          # Keep last 168 files (7 * 24), remove older hourly snapshots
          for f in $(ls backups/storage-snapshot-20*.json 2>/dev/null | grep -E 'storage-snapshot-[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{2}\.json$' | sort -r | tail -n +169); do
            [ -f "$f" ] && rm -f "$f" && echo "Removed old snapshot: $f"
          done

      - name: Commit and push
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/storage-snapshot-20*.json backups/storage-snapshot-latest.json 2>/dev/null || true
          git status
          git diff --staged --quiet && echo "No changes to commit" || (git commit -m "chore: hourly backup (7-day trial) [skip ci]" && git push)
