name: Region cleanup dry-run

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/region-cleanup-dryrun.yml'
      - 'server/scripts/region-cleanup-dryrun-remote.js'
      - 'server/services/regionCleanupDryRun.js'

jobs:
  dry-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Sync presales users to Postgres (after deploy)
        continue-on-error: true
        env:
          REMOTE_STORAGE_BASE: ${{ secrets.REMOTE_STORAGE_BASE }}
          REMOTE_STORAGE_USER: ${{ secrets.REMOTE_STORAGE_USER }}
          REMOTE_STORAGE_API_KEY: ${{ secrets.REMOTE_STORAGE_API_KEY }}
        run: |
          API_ROOT="${REMOTE_STORAGE_BASE%/api/storage}"
          curl -sfS -X POST "$API_ROOT/api/admin/presales-regions/sync" \
            -H "Accept: application/json" \
            -H "X-Admin-User: $REMOTE_STORAGE_USER" \
            -H "X-Admin-Api-Key: $REMOTE_STORAGE_API_KEY" \
            -H "X-Api-Key: $REMOTE_STORAGE_API_KEY" || echo "sync skipped (deploy may be pending)"
      - name: Region cleanup dry-run (remote storage)
        env:
          REMOTE_STORAGE_BASE: ${{ secrets.REMOTE_STORAGE_BASE }}
          REMOTE_STORAGE_USER: ${{ secrets.REMOTE_STORAGE_USER }}
          REMOTE_STORAGE_API_KEY: ${{ secrets.REMOTE_STORAGE_API_KEY }}
        run: node server/scripts/region-cleanup-dryrun-remote.js | tee dryrun.log
      - name: Job summary
        run: |
          echo "## Region cleanup dry-run" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 100 dryrun.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: region-cleanup-dryrun
          path: server/scripts/region-cleanup-dryrun-remote-*.json
          if-no-files-found: error
          retention-days: 14
      - name: Publish report on main (readable via git pull)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p reports
          cp server/scripts/region-cleanup-dryrun-remote-*.json reports/region-cleanup-latest.json
          git add reports/region-cleanup-latest.json
          git diff --staged --quiet || git commit -m "chore: region cleanup dry-run report [skip ci]"
          git push
