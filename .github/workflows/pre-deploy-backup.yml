# Pre-deploy backup — run manually before a risky deploy. Snapshot is an Actions artifact only (not committed to Git).
name: Pre-deploy backup

on:
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create backups directory
        run: mkdir -p backups

      - name: Check backup secrets
        env:
          REMOTE_STORAGE_BASE: ${{ secrets.REMOTE_STORAGE_BASE }}
        run: |
          if [ -z "$REMOTE_STORAGE_BASE" ]; then
            echo "::error::REMOTE_STORAGE_BASE secret is not set. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Run pre-deploy storage snapshot
        env:
          REMOTE_STORAGE_BASE: ${{ secrets.REMOTE_STORAGE_BASE }}
          REMOTE_STORAGE_USER: ${{ secrets.REMOTE_STORAGE_USER }}
          REMOTE_STORAGE_API_KEY: ${{ secrets.REMOTE_STORAGE_API_KEY }}
        run: |
          ts=$(date -u +%Y%m%dT%H%M%S)
          node server/scripts/export-storage-snapshot.js "" "backups/pre-deploy-${ts}.json"
          ls -la backups/pre-deploy-*.json

      - name: Upload pre-deploy artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pre-deploy-${{ github.run_id }}
          path: backups/pre-deploy-*.json
          retention-days: 30
          if-no-files-found: error
