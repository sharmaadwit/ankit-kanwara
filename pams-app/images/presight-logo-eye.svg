<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 32" width="40" height="32" aria-hidden="true">
  <defs>
    <linearGradient id="eye-grad" x1="0%" y1="50%" x2="100%" y2="30%">
      <stop offset="0%" stop-color="#5E34F1"/>
      <stop offset="45%" stop-color="#D01692"/>
      <stop offset="85%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>
  <!-- Eye outline (almond): sharp upper lid, smoother lower -->
  <path d="M8 16c0-4 3-10 10-10s10 6 10 10-3 10-10 10S8 20 8 16z" fill="none" stroke="url(#eye-grad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Pupil -->
  <circle cx="18" cy="16" r="5" fill="url(#eye-grad)"/>
  <!-- Inner arrow (through pupil, bottom-left to top-right) -->
  <path d="M16 18l2-2 4 4-1.5 1.5-4-4-2 2v-1.5z" fill="url(#eye-grad)"/>
  <!-- Outer arrow (from top-right of eye, curving up-right) -->
  <path d="M24 12l2 2-2 4 3 2 2-3 2 1-3 5-7-4 2-4-2-4z" fill="url(#eye-grad)"/>
</svg>
