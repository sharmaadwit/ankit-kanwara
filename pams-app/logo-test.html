<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PreSight logo – local test</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 2rem; }
        .row { display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .block { padding: 1.5rem; border-radius: 8px; }
        .white { background: #fff; border: 1px solid #eee; }
        .purple { background: linear-gradient(90deg, #5E34F1 0%, #D01692 50%, #FF3964 100%); }
        .logo-wrap { display: inline-flex; align-items: center; padding: 0.35rem 0; }
        .logo-wrap img { height: auto; width: auto; max-height: 46px; display: block; background: transparent; object-fit: contain; }
        .logo-white { height: 40px; width: auto; }
        .logo-purple { height: 32px; width: auto; mix-blend-mode: multiply; object-fit: contain; }
        h1 { margin: 0 0 0.5rem 0; font-size: 1rem; color: #666; }
    </style>
</head>
<body>
    <h1>PreSight logo – local test</h1>
    <p>Same image everywhere; no hover. Open in browser to test.</p>

    <div class="row">
        <div class="block white">
            <h2 style="margin:0 0 1rem 0; font-size:0.9rem; color:#999;">On white (login)</h2>
            <div class="logo-wrap">
                <img src="images/presight-logo.png" alt="PreSight" class="logo-white">
            </div>
        </div>
        <div class="block purple">
            <h2 style="margin:0 0 1rem 0; font-size:0.9rem; color:rgba(255,255,255,0.8);">On purple (header) – same PNG, blend so no white box</h2>
            <div class="logo-wrap">
                <img src="images/presight-logo.png" alt="PreSight" class="logo-purple">
            </div>
        </div>
    </div>

    <div class="row">
        <div class="block white">
            <h2 style="margin:0 0 1rem 0; font-size:0.9rem; color:#999;">Sizes</h2>
            <img src="images/presight-logo.png" alt="" style="height:32px; margin-right:1rem;">
            <img src="images/presight-logo.png" alt="" style="height:46px;">
        </div>
    </div>
</body>
</html>
